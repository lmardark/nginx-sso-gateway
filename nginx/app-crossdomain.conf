# nginx/app-crossdomain.conf
# Para aplicações em DOMÍNIO DIFERENTE (ex: outrositio.com)
# A autenticação usa o fluxo JWT: redireciona para /sso/token no gateway,
# que emite um token de uso único redirecionado ao callback da aplicação.
#
# Substitua:
#   outrositio.com      → domínio da sua aplicação
#   auth.seudominio.com → URL do SSO gateway
#   SUA_API_KEY         → api_key gerada em /admin/apps
#   localhost:4000      → seu backend local ou upstream

server {
    listen 443 ssl;
    server_name outrositio.com;

    ssl_certificate     /etc/ssl/certs/outrositio.crt;
    ssl_certificate_key /etc/ssl/private/outrositio.key;

    # Callback que recebe o sso_token gerado pelo gateway
    # Sua aplicação deve validar o token chamando POST /sso/validate
    location /sso/callback {
        proxy_pass http://localhost:4000/sso/callback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        # Verifique a sessão no lado da sua aplicação.
        # Se não autenticado, redirecione para o SSO token endpoint:
        #
        # https://auth.seudominio.com/sso/token
        #   ?app=SUA_API_KEY
        #   &redirect=https://outrositio.com/sso/callback
        #
        # O gateway redireciona de volta para o callback com ?sso_token=<jwt>
        # Seu backend valida o token via POST /sso/validate:
        #
        # POST https://auth.seudominio.com/sso/validate
        # { "token": "<jwt>", "api_key": "SUA_API_KEY" }

        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
