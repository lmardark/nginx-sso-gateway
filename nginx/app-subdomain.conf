# nginx/app-subdomain.conf
# Para aplicações no MESMO domínio (ex: app.seudominio.com)
# A autenticação é feita via cookie de sessão compartilhado.
#
# Substitua:
#   app.seudominio.com  → seu subdomínio
#   auth.seudominio.com → URL do SSO gateway
#   localhost:3000      → seu backend local ou upstream

server {
    listen 443 ssl;
    server_name app.seudominio.com;

    ssl_certificate     /etc/ssl/certs/seudominio.crt;
    ssl_certificate_key /etc/ssl/private/seudominio.key;

    # Endpoint de validação de sessão do SSO
    location = /auth/check {
        internal;
        proxy_pass              http://auth.seudominio.com/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Cookie $http_cookie;
    }

    location / {
        # Valida sessão antes de servir qualquer rota
        auth_request /auth/check;

        # Se a sessão for inválida (401), redireciona para o login
        error_page 401 = @login_redirect;

        # Sua aplicação real aqui
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location @login_redirect {
        return 302 https://auth.seudominio.com/login?return_to=$scheme://$host$request_uri;
    }
}
