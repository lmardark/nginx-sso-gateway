# nginx/sso-gateway.conf
# Configuração do servidor SSO (auth.seudominio.com)

server {
    listen 80;
    server_name auth.seudominio.com;

    # Redirecionar para HTTPS em produção
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.seudominio.com;

    ssl_certificate     /etc/ssl/certs/seudominio.crt;
    ssl_certificate_key /etc/ssl/private/seudominio.key;

    root /var/www/nginx-sso-gateway/public;
    index index.php;

    # Servir arquivos estáticos diretamente
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
