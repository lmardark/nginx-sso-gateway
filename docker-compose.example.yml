version: "3.9"

# Exemplo de docker-compose para o nginx-sso-gateway.
# Copie para docker-compose.yml e ajuste as variáveis de ambiente.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"            # php artisan key:generate --show
      APP_URL: "https://auth.seudominio.com"

      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/storage/database.sqlite

      SESSION_DRIVER: database
      SESSION_DOMAIN: ".seudominio.com"   # ponto inicial compartilha entre subdomínios
      SESSION_SECURE_COOKIE: "true"
      SESSION_SAME_SITE: lax
      SESSION_LIFETIME: 480

      ALLOWED_HOST_REDIRECT: "seudominio.com"  # host raiz (sem ponto)

      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - sso_storage:/var/www/storage
    networks:
      - sso_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/sso-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - sso_storage:/var/www/storage:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - /etc/ssl/private:/etc/ssl/private:ro
    depends_on:
      - app
    networks:
      - sso_net

volumes:
  sso_storage:

networks:
  sso_net:
    driver: bridge
